<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แก้ไขข้อมูล</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-top: 80px;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 340px;
            margin: auto;
        }
        .current-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #334155;
            margin-bottom: 12px;
        }
        .no-img {
            width: 80px;
            height: 80px;
            background: #334155;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 12px;
        }
        label { display: block; text-align: left; margin: 8px 0 4px; color: #94a3b8; font-size: 13px; }
        select, input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        input[type="file"] {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 4px;
        }
        button {
            margin-top: 16px;
            padding: 10px 24px;
            background: #facc15;
            border: none;
            border-radius: 5px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }
        a { color: #38bdf8; display: block; margin-top: 15px; }
    </style>
</head>
<body>

<div class="box">
    <h2>✏️ แก้ไขข้อมูล</h2>

    {% if data['image'] %}
        <img class="current-img" src="/static/uploads/{{ data['image'] }}" alt="current">
        <p style="font-size:12px; color:#94a3b8;">รูปปัจจุบัน</p>
    {% else %}
        <div class="no-img">⚔️</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        <label>Role</label>
        <select name="role">
            {% for r in ['Top','Jungle','Mid','ADC','Support'] %}
                <option {% if r == data['role'] %}selected{% endif %}>{{ r }}</option>
            {% endfor %}
        </select>

        <label>Champion</label>
        <input type="text" name="champion" value="{{ data['champion_name'] }}" required>

        <label>เปลี่ยนรูปภาพ (ถ้าต้องการ)</label>
        <input type="file" name="image" accept="image/*">

        <button type="submit">💾 บันทึก</button>
    </form>

    <a href="/dashboard">← กลับ</a>
</div>

</body>
</html>
